<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0f1419">
  <title>Jogo da Velha</title>
  <script type="module" crossorigin src="/assets/index-BB0AoOtZ.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CeLMBxcN.css">
</head>
<body>
  <div class="screen">
    <main class="app">
      <header class="header">
        <h1>Jogo da Velha</h1>
        <p class="subtitle">Dois jogadores · X começa</p>
      </header>

      <section class="scoreboard" aria-label="Placar">
        <div class="score-card score-x">
          <span class="score-label">X</span>
          <span class="score-value" id="score-x">0</span>
        </div>
        <div class="score-card score-draw">
          <span class="score-label">Empates</span>
          <span class="score-value" id="score-draw">0</span>
        </div>
        <div class="score-card score-o">
          <span class="score-label">O</span>
          <span class="score-value" id="score-o">0</span>
        </div>
      </section>

      <p class="status" id="status" role="status" aria-live="polite">Vez do jogador X</p>

      <div class="board-wrap">
        <div class="board" id="board" role="grid" aria-label="Tabuleiro do jogo da velha">
          <button type="button" class="cell" data-index="0" aria-label="Célula 1"></button>
          <button type="button" class="cell" data-index="1" aria-label="Célula 2"></button>
          <button type="button" class="cell" data-index="2" aria-label="Célula 3"></button>
          <button type="button" class="cell" data-index="3" aria-label="Célula 4"></button>
          <button type="button" class="cell" data-index="4" aria-label="Célula 5"></button>
          <button type="button" class="cell" data-index="5" aria-label="Célula 6"></button>
          <button type="button" class="cell" data-index="6" aria-label="Célula 7"></button>
          <button type="button" class="cell" data-index="7" aria-label="Célula 8"></button>
          <button type="button" class="cell" data-index="8" aria-label="Célula 9"></button>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="btn-restart">Nova partida</button>
        <button type="button" class="btn btn-secondary" id="btn-reset-score">Zerar placar</button>
      </div>
    </main>
  </div>

</body>
</html>
